---
# tasks/build.yml - Compila il firmware OpenWrt

- name: Calcola numero job make
  ansible.builtin.set_fact:
    _make_jobs: >-
      {{
        openwrt_make_jobs | int
        if openwrt_make_jobs | default(0) | int > 0
        else (ansible_processor_nproc | int + openwrt_make_jobs_extra | default(2) | int)
      }}

- name: Imposta variabili ambiente build
  ansible.builtin.set_fact:
    _openwrt_build_env: >-
      {{
        {
          'CONFIG_CCACHE': 'y',
          'CCACHE_DIR': openwrt_ccache_dir,
          'CCACHE_MAXSIZE': openwrt_ccache_maxsize,
          'CCACHE_COMPILERCHECK': '%compiler% -dumpmachine; %compiler% -dumpversion',
          'CCACHE_COMPRESS': '1',
          'CCACHE_SLOPPINESS': 'file_macro,locale,time_macros'
        } if _openwrt_use_ccache | bool else {}
      }}

- name: "Build: {{ openwrt_target }} VPN={{ openwrt_vpn }} CP={{ openwrt_captive_portal }} jobs={{ _make_jobs }}"
  ansible.builtin.debug:
    msg:
      - "Target : {{ openwrt_target }}"
      - "VPN    : {{ openwrt_vpn }}"
      - "CP     : {{ openwrt_captive_portal }}"
      - "Jobs   : {{ _make_jobs }}"
      - "ccache : {{ _openwrt_use_ccache }}"
      - "tmpfs  : {{ openwrt_tmpfs_enabled | default(true) }}"

- name: Rimuovi tmp/ esistente per fare spazio al symlink
  ansible.builtin.file:
    path: "{{ openwrt_src_dir }}/tmp"
    state: absent
  when: openwrt_tmpfs_enabled | default(true) | bool

- name: Crea symlink openwrt/tmp -> tmpfs
  ansible.builtin.file:
    src: "{{ openwrt_tmpfs_path }}"
    dest: "{{ openwrt_src_dir }}/tmp"
    state: link
  when: openwrt_tmpfs_enabled | default(true) | bool

- name: Crea directory openwrt/tmp (tmpfs disabilitato)
  ansible.builtin.file:
    path: "{{ openwrt_src_dir }}/tmp"
    state: directory
    mode: "0755"
  when: not (openwrt_tmpfs_enabled | default(true) | bool)

- name: make clean (solo target obbligatori)
  ansible.builtin.command:
    cmd: make clean
    chdir: "{{ openwrt_src_dir }}"
  when: _openwrt_clean_build | bool
  changed_when: true

- name: Pulisci bin/ precedente
  ansible.builtin.file:
    path: "{{ openwrt_src_dir }}/bin"
    state: "{{ item }}"
  loop: [absent, directory]

- name: Download sorgenti pacchetti
  ansible.builtin.command:
    cmd: "make download -j{{ _make_jobs }}"
    chdir: "{{ openwrt_src_dir }}"
  environment: "{{ _openwrt_build_env }}"
  changed_when: true

# Nota: NON usiamo il fallback "|| make V=s" perche' il secondo make
# riparte da capo e svuota bin/ prima che il check successivo lo legga.
# ignore_errors: true perche' pacchetti non critici (intel-microcode ecc.)
# possono fallire con exit code 2 senza compromettere i firmware reali.
- name: Compila firmware
  ansible.builtin.command:
    cmd: "make -j{{ _make_jobs }}"
    chdir: "{{ openwrt_src_dir }}"
  environment: "{{ _openwrt_build_env }}"
  changed_when: true
  ignore_errors: true
  register: _build_result
  async: 7200
  poll: 30

- name: Mostra errori make (se presenti)
  ansible.builtin.debug:
    msg: "make ha restituito exit code {{ _build_result.rc }} - verifico i firmware prodotti..."
  when: _build_result.rc | default(0) != 0

# Verifica che i firmware siano stati prodotti
- name: Verifica firmware prodotti in bin/targets
  ansible.builtin.find:
    paths: "{{ openwrt_src_dir }}/bin/targets"
    patterns:
      - "*-sysupgrade.bin"
      - "*-factory.bin"
      - "*.img.gz"
      - "*.img"
    recurse: true
    file_type: file
  register: _build_firmware_check

- name: Fallisci se nessun firmware prodotto (build realmente fallita)
  ansible.builtin.fail:
    msg: >
      Build fallita per {{ openwrt_target }} VPN={{ openwrt_vpn }}:
      nessun firmware trovato in bin/targets/.
      Exit code make: {{ _build_result.rc | default('?') }}
  when: _build_firmware_check.files | length == 0

- name: "Firmware prodotti: {{ _build_firmware_check.files | length }} file"
  ansible.builtin.debug:
    msg: "{{ _build_firmware_check.files | map(attribute='path') | map('basename') | list }}"
